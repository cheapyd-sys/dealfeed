<xf:title>{$pageTitle}</xf:title>

<xf:head option="canonical"><link rel="canonical" href="{$xf.options.boardUrl}/" /></xf:head>

<xf:head option="dealfeed_social_meta">
    <xf:if is="$ogDescription is not empty">
        <meta name="description" content="{$ogDescription}" />
        <meta property="og:description" content="{$ogDescription}" />
        <meta name="twitter:description" content="{$ogDescription}" />
    </xf:if>
    <xf:if is="$ogImage is not empty">
        <meta property="og:image" content="{$ogImage}" />
        <xf:if is="$ogImageAlt is not empty">
            <meta property="og:image:alt" content="{$ogImageAlt}" />
        </xf:if>
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:image" content="{$ogImage}" />
        <xf:if is="$ogImageAlt is not empty">
            <meta name="twitter:image:alt" content="{$ogImageAlt}" />
        </xf:if>
        <xf:set var="$head.meta_image_url" value="1" />
    </xf:if>
</xf:head>

<style>
/* Hide XF chrome (page header, breadcrumbs, default padding) on this page only.
   The deal feed widget supplies its own header — duplicates look noisy. */
.p-body-header { display: none !important; }
.p-breadcrumbs:not(.p-nav-list) { display: none !important; }
.p-body-pageContent .p-body-main .p-body-pageContent { padding-top: 0 !important; }
</style>

<xf:widget class="CAG\DealFeed\Widget\DealFeed" />
