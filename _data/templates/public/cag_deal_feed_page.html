<xf:title>{$pageTitle}</xf:title>

<xf:head option="canonical"><link rel="canonical" href="{$xf.options.boardUrl}/" /></xf:head>

<xf:if is="$ogDescription is not empty">
    <xf:head option="meta_description"><meta name="description" content="{$ogDescription}" /></xf:head>
    <xf:head option="og_description"><meta property="og:description" content="{$ogDescription}" /></xf:head>
    <xf:head option="twitter_description"><meta name="twitter:description" content="{$ogDescription}" /></xf:head>
</xf:if>

<xf:if is="$ogImage is not empty">
    <xf:comment>option="meta_image_url" matches the key XF's PAGE_CONTAINER checks before falling back to the site logo, so this ALSO suppresses the default og:image — no duplicate tag.</xf:comment>
    <xf:head option="meta_image_url"><meta property="og:image" content="{$ogImage}" /></xf:head>
    <xf:if is="$ogImageAlt is not empty">
        <xf:head option="og_image_alt"><meta property="og:image:alt" content="{$ogImageAlt}" /></xf:head>
    </xf:if>
    <xf:head option="twitter_card"><meta name="twitter:card" content="summary_large_image" /></xf:head>
    <xf:head option="twitter_image"><meta name="twitter:image" content="{$ogImage}" /></xf:head>
    <xf:if is="$ogImageAlt is not empty">
        <xf:head option="twitter_image_alt"><meta name="twitter:image:alt" content="{$ogImageAlt}" /></xf:head>
    </xf:if>
</xf:if>

<style>
/* Hide XF chrome (page header, breadcrumbs, default padding) on this page only.
   The deal feed widget supplies its own header — duplicates look noisy. */
.p-body-header { display: none !important; }
.p-breadcrumbs:not(.p-nav-list) { display: none !important; }
.p-body-pageContent .p-body-main .p-body-pageContent { padding-top: 0 !important; }
</style>

<xf:widget class="CAG\DealFeed\Widget\DealFeed" />
